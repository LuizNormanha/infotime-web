name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - uses: nrwl/nx-set-shas@v4

      - name: Cache Nx
        uses: actions/cache@v4
        with:
          path: .nx/cache
          key: nx-${{ runner.os }}-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            nx-${{ runner.os }}-${{ github.ref_name }}-
            nx-${{ runner.os }}-

      - name: Instalar dependências
        run: npm ci

      - name: Auditoria de segurança (falha em high ou critical)
        run: npm audit --audit-level=high

      - name: Prisma generate (api)
        working-directory: api
        run: npx prisma generate

      - name: Typecheck (API)
        run: npx nx run api:typecheck

      - name: Lint (affected em PR)
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            npx nx affected -t lint --parallel=3
          else
            npm run lint
          fi

      - name: Testes (affected em PR)
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            npx nx affected -t test --parallel=3
          else
            npm test
          fi

      - name: E2E (API)
        if: github.event_name != 'pull_request'
        working-directory: api
        run: npm run test:e2e

      - name: Build (affected em PR)
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            npx nx affected -t build --parallel=2
          else
            npm run build
          fi
